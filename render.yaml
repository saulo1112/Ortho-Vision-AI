services:
  - type: web
    name: orthovision-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orthovision-db
          property: connectionString

databases:
  - name: orthovision-db
    plan: free
